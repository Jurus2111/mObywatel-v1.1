  <script>
    async function startCamera() {
      try {
        const constraints = {
          video: {
            facingMode: { ideal: "environment" }  // preferowana tylna kamerka, jeĹ›li dostÄ™pna
          },
          audio: false
        };

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        document.getElementById('video').srcObject = stream;
      } catch (err) {
        console.error("Nie udaĹ‚o siÄ™ uruchomiÄ‡ kamery:", err);
      }
    }

    startCamera();
  </script>
