<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <title>mObywatel – Kod QR</title>
    <link rel="apple-touch-icon" href="assets/images/otM5jOA.png">
    <link rel="icon" type="image/x-icon" href="assets/images/otM5jOA.png">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: "SF Pro Display", "Poppins", sans-serif;
            min-height: 100vh;
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
        }

        .content {
            padding: 0 16px;
            padding-top: max(20px, env(safe-area-inset-top));
        }

        .page_main_title {
            font-size: 30px;
            font-weight: 700;
            margin-top: 50px;
            margin-bottom: 4px;
        }

        .page_subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 28px;
        }

        /* Action cards - white cards like original */
        .action_grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action_card {
            background-color: white;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 15% 75% 10%;
            align-items: center;
            height: 90px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .action_card:active { opacity: 0.7; }

        .action_image {
            width: 35px;
            margin-left: 20px;
        }

        .action_text {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .action_title {
            font-size: 17px;
            font-weight: 500;
            color: #000;
        }

        .action_subtitle {
            font-size: 13px;
            color: #555;
        }

        .arrow {
            width: 20px;
            margin-right: 15px;
        }

        /* Bottom bar - identical to home.html */
        .bottom_bar {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            box-sizing: border-box !important;
            background-color: #121212 !important;
            border-top: none !important;
            height: auto !important;
            padding-top: 12px !important;
            padding-bottom: calc(2px + env(safe-area-inset-bottom)) !important;
            display: flex;
            align-items: center;
            z-index: 5;
        }

        .bottom_bar_grid {
            grid-template-columns: repeat(4, 25%) !important;
            margin-top: 0 !important;
            height: auto !important;
            align-items: center;
            width: 100% !important;
            display: grid !important;
        }

        .bottom_element_grid {
            margin-top: 0 !important;
            justify-content: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .active_icon_bg {
            background-color: #0b2545;
            padding: 4px 20px;
            border-radius: 16px;
            margin-bottom: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bottom_element_image { margin-bottom: 4px !important; }
        .active_icon_bg .bottom_element_image { margin-bottom: 0 !important; }

        .bottom_element_text {
            color: #888888 !important;
            margin-top: 0 !important;
            font-size: 11px;
            font-weight: 500;
        }

        .bottom_element_text.open { color: #4da6ff !important; }
    </style>
</head>
<body>

    <div class="content">
        <h1 class="page_main_title">Kod QR</h1>
        <p class="page_subtitle">Wybierz, co chcesz zrobić</p>

        <div class="action_grid">
            <!-- Zeskanuj kod QR - FIRST -->
            <div class="action_card">
                <img class="action_image" src="assets/images/Pfan6Qa.png" alt="">
                <div class="action_text">
                    <p class="action_title">Zeskanuj kod QR</p>
                    <p class="action_subtitle">Zaloguj się lub potwierdź swoje dane.</p>
                </div>
                <img class="arrow" src="assets/images/2aN0vJE.png" alt="">
            </div>

            <!-- Pokaż kod QR - SECOND -->
            <div class="action_card" onclick="location.href='qr_show.html' + window.location.search">
                <img class="action_image" src="assets/images/YJpEaiC.png" alt="">
                <div class="action_text">
                    <p class="action_title">Pokaż kod QR</p>
                    <p class="action_subtitle">Sprawdź dokument innej osoby.</p>
                </div>
                <img class="arrow" src="assets/images/2aN0vJE.png" alt="">
            </div>
        </div>
    </div>

    <!-- Bottom bar identical to home.html -->
    <div class="bottom_bar">
        <div class="bottom_bar_grid">
            <div class="bottom_element_grid" onclick="location.href='home.html' + window.location.search">
                <div class="bottom_element_image home_open"></div>
                <p class="bottom_element_text">Dokumenty</p>
            </div>
            <div class="bottom_element_grid" onclick="location.href='uslugi.html' + window.location.search">
                <div class="bottom_element_image services"></div>
                <p class="bottom_element_text">Usługi</p>
            </div>
            <div class="bottom_element_grid" onclick="location.href='qr2.html' + window.location.search">
                <div class="active_icon_bg">
                    <div class="bottom_element_image qr"></div>
                </div>
                <p class="bottom_element_text open">Kod QR</p>
            </div>
            <div class="bottom_element_grid">
                <div class="bottom_element_image more"></div>
                <p class="bottom_element_text">Więcej</p>
            </div>
        </div>
    </div>

    <script src="assets/js/manifest.js"></script>
</body>
</html>
