<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>mObywatel</title>
    
    <!-- PWA / iPhone configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-title" content="mObywatel">
    <link rel="apple-touch-icon" href="assets/images/otM5jOA.png">
    
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/home.css">
    <style>
        /* Dark mode modifications */
        body {
            background-color: #121212 !important;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .container {
            padding: 15px;
            padding-top: max(15px, env(safe-area-inset-top));
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top_grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .main_logo {
            border-radius: 8px;
            width: 35px;
        }

        .right {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-right: 0;
            margin-left: auto;
        }
        
        .icon_btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: white;
            display: flex;
        }

        .page_title {
            font-size: 28px;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: linear-gradient(135deg, #0052cc 0%, #0073e6 100%) !important;
            border-radius: 16px;
            height: 220px;
            width: 100%;
            border: none;
            box-shadow: none;
            position: relative;
        }

        .card_title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            padding: 20px;
            display: block;
        }
        
        .card_emblem {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dostosuj_widok {
            color: #4da6ff;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }

        .dodaj_dokument_btn {
            background-color: #4a9ff5;
            color: #0f172a;
            border: none;
            border-radius: 14px;
            padding: 14px 22px;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            position: fixed;
            bottom: calc(95px + env(safe-area-inset-bottom));
            right: 20px;
            box-shadow: none;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bottom_bar {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            box-sizing: border-box !important;
            background-color: #121212 !important;
            border-top: none !important;
            height: auto !important;
            padding-top: 12px !important;
            padding-bottom: calc(2px + env(safe-area-inset-bottom)) !important;
            display: flex;
            align-items: center;
            z-index: 5;
        }

        .bottom_bar_grid {
            grid-template-columns: repeat(4, 25%) !important;
            margin-top: 0 !important;
            height: auto !important;
            align-items: center;
        }
        
        .bottom_element_grid {
            margin-top: 0 !important;
            justify-content: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .active_icon_bg {
            background-color: #0b2545; /* Dark blue pill */
            padding: 4px 20px;
            border-radius: 16px;
            margin-bottom: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bottom_element_image {
            margin-bottom: 4px !important;
        }
        
        .active_icon_bg .bottom_element_image {
            margin-bottom: 0 !important;
        }

        .bottom_element_text {
            color: #888888 !important;
            margin-top: 0 !important;
            font-size: 11px;
            font-weight: 500;
        }

        .bottom_element_text.open {
            color: #4da6ff !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top_grid">
        <!-- Main Logo -->
        <img class="main_logo" src="assets/images/otM5jOA.png" alt="Logo">
        
        <!-- Right Icons -->
        <div class="right">
            <button class="icon_btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            </button>
            <button class="icon_btn" style="position: relative;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                <span style="position: absolute; top: -2px; right: 2px; width: 8px; height: 8px; background-color: #e21c22; border-radius: 50%;"></span>
            </button>
        </div>
    </div>

    <h1 class="page_title">Dokumenty</h1>

    <div class="card" onclick="location.href='card.html' + window.location.search" style="cursor: pointer;">
        <span class="card_title">mDowód</span>
        <div class="card_emblem" style="padding: 0; background-color: transparent;">
            <img src="assets/images/beztla1.png" style="width: 32px; height: 32px; border-radius: 6px;">
        </div>
    </div>

    <a href="#" class="dostosuj_widok">Dostosuj widok</a>
</div>

<button class="dodaj_dokument_btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" style="margin-right: 8px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    Dodaj dokument
</button>

<div class="bottom_bar">
    <div class="bottom_bar_grid">
        <div class="bottom_element_grid" onclick="location.href='home.html' + window.location.search">
            <div class="active_icon_bg">
                <div class="bottom_element_image home_open"></div>
            </div>
            <p class="bottom_element_text open">Dokumenty</p>
        </div>
        <div class="bottom_element_grid" onclick="location.href='uslugi.html' + window.location.search">
            <div class="bottom_element_image services"></div>
            <p class="bottom_element_text">Usługi</p>
        </div>
        <div class="bottom_element_grid" onclick="location.href='qr2.html' + window.location.search">
            <div class="bottom_element_image qr"></div>
            <p class="bottom_element_text">Kod QR</p>
        </div>
        <div class="bottom_element_grid" send="more.html">
            <div class="bottom_element_image more"></div>
            <p class="bottom_element_text">Więcej</p>
        </div>
    </div>
</div>

<script src="assets/js/manifest.js"></script>
<script src="assets/js/bar.js"></script>
</body>
</html>
